# =============================================================================
# Site settings                                                        [필수]
# =============================================================================

title: Hyungbo Shim           # 브라우저 탭 제목, 헤더에 표시
first_name: Hyungbo           # jekyll-scholar가 논문 저자 이름 볼드 처리에 사용
last_name: Shim
email: hshim@snu.ac.kr        # about 페이지 소셜 아이콘 링크

url: https://hyungbo.github.io  # [필수] 사이트 전체 URL
baseurl: ""                     # [필수] username.github.io이면 "" 그대로.
                                #        서브경로라면 "/레포명" 으로 변경.
last_updated: true             # 각 페이지 하단에 "마지막 수정일" 표시 여부
back_to_top: true               # 스크롤 시 맨 위로 버튼 표시

# =============================================================================
# Layout
# =============================================================================

navbar_fixed: true      # 스크롤해도 상단 네비게이션바 고정
footer_fixed: false      # 푸터 화면 하단 고정 (false 권장 - true면 공간을 항상 차지)
search_enabled: false    # 우상단 검색 버튼 표시
bib_search: true        # publications 페이지 논문 필터 입력란 표시

max_width: 1280px      # 콘텐츠 최대 너비

# =============================================================================
# Analytics
# =============================================================================
# Google Analytics 사용 시 아래에 ID를 입력하고
# Optional Features 섹션의 enable_google_analytics를 true로 변경.

google_analytics:         # 형식: G-XXXXXXXXXX
google_site_verification: # Google Search Console 인증 코드

# =============================================================================
# Social links
# =============================================================================
# about 페이지 하단 소셜 아이콘에 표시됨.
# 어떤 아이콘을 보여줄지는 _data/socials.yml 에서 설정.

scholar_userid: QYs4ITcAAAAJ
orcid_id: 0000-0002-5972-8114
github_username: hyungbo
linkedin_username: hyungbo-shim-737078148

# =============================================================================
# Affiliation
# =============================================================================
# about 페이지 subtitle 영역에 표시되는 소속 정보.

affiliation: Seoul National University
affiliation_url: https://www.snu.ac.kr

# =============================================================================
# Blog
# =============================================================================

blog_name: Notes
blog_description: thoughts on control, systems, and beyond
permalink: /blog/:year/:title/           # [필수] 블로그 포스트 URL 형식
lsi: false                               # 관련 포스트 AI 분석 (false 유지)

pagination:
  enabled: true                          # [필수] 블로그 페이지네이션 활성화

related_blog_posts:
  enabled: true                          # 포스트 하단 "관련 글" 섹션 표시
  max_related: 5

# 댓글 기능 (GitHub Discussions 기반).
# 사용하려면 https://giscus.app 에서 repo/repo_id/category_id를 발급받아 입력.
# 지금은 비어 있으므로 댓글 없이 작동.
giscus:
  repo:
  repo_id:
  category: Comments
  category_id:
  mapping: title
  strict: 1
  reactions_enabled: 1
  input_position: bottom
  dark_theme: dark
  light_theme: light
  emit_metadata: 0
  lang: en

newsletter:
  enabled: false                         # 뉴스레터 구독 폼 (비활성)

external_sources:                        # 외부 RSS 피드 포스트 가져오기 (비워두면 무시)

# =============================================================================
# Collections                                                          [필수]
# =============================================================================
# _news, _projects 컬렉션을 삭제했으므로 현재 비어 있음.
# 나중에 커스텀 컬렉션을 추가하면 여기에 선언.

collections:

# =============================================================================
# Jekyll settings                                                      [필수]
# =============================================================================

markdown: kramdown      # [필수] 마크다운 파서
highlighter: rouge      # [필수] 코드 문법 강조
kramdown:               # [필수] GFM(GitHub 스타일 마크다운) 파서 설정
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages", "_scripts"]   # [필수] 이 폴더들을 빌드에 포함
exclude:                          # 빌드에서 제외할 파일 목록
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - docker-compose-slim.yml
  - FAQ.md
  - Gemfile
  - Gemfile.lock
  - INSTALL.md
  - LICENSE
  - package.json
  - package-lock.json
  - purgecss.config.js
  - README.md
  - vendor

keep_files:             # GitHub Pages 배포 시 _site 폴더에 보존할 파일
  - CNAME
  - .nojekyll

# =============================================================================
# Plugins                                                              [필수]
# =============================================================================
# Gemfile의 gem 목록과 반드시 일치해야 함.

plugins:
  - jekyll-3rd-party-libraries  # third_party_libraries 섹션의 CDN 라이브러리 관리
  - jekyll-archives-v2          # 블로그 연도/태그/카테고리별 아카이브 페이지 생성
  - jekyll-cache-bust           # CSS/JS URL에 해시 추가 (브라우저 캐시 무효화)
  - jekyll-email-protect        # 이메일 주소 스팸봇 차단용 난독화
  - jekyll-feed                 # RSS 피드(feed.xml) 자동 생성
  - jekyll-imagemagick          # 이미지를 WebP로 자동 변환 (반응형 이미지)
  - jekyll-link-attributes      # 외부 링크에 target="_blank" 등 자동 추가
  - jekyll-paginate-v2          # 블로그 페이지네이션
  - jekyll-regex-replace        # 정규식으로 텍스트 치환
  - jekyll/scholar              # BibTeX → 논문 목록 자동 렌더링
  - jekyll-sitemap              # sitemap.xml 자동 생성 (SEO)
  - jekyll-socials              # 소셜 링크 메타태그 생성
  - jekyll-tabs                 # 탭 UI 컴포넌트
  - jekyll-toc                  # 포스트 내 목차(Table of Contents) 자동 생성

defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false            # assets 폴더는 sitemap에서 제외

sass:
  style: compressed             # CSS 출력 형식 (compressed = 최소화)

# =============================================================================
# Jekyll Archives (블로그 아카이브)
# =============================================================================

jekyll-archives:
  posts:
    enabled: [year, tags, categories]  # 연도/태그/카테고리별 아카이브 페이지 생성
    permalinks:
      year: "/blog/:year/"
      tags: "/blog/:type/:name/"
      categories: "/blog/:type/:name/"

display_tags: []        # 블로그 페이지 상단에 표시할 태그 목록 (비워두면 표시 안 함)
display_categories: []  # 블로그 페이지 상단에 표시할 카테고리 목록

# =============================================================================
# Jekyll Scholar (논문 목록)
# =============================================================================

scholar:
  last_name: [Shim]               # 논문 저자 목록에서 본인 이름 볼드 처리
  first_name: [Hyungbo, H.]       # 이니셜도 함께 처리

  style: apa                      # 인용 스타일 (apa, ieee, chicago 등)
  locale: en

  source: /_bibliography/         # [필수] papers.bib 위치
  bibliography: papers.bib        # [필수] BibTeX 파일명
  bibliography_template: bib      # [필수] 렌더링 템플릿 (_layouts/bib.liquid)
  bibtex_filters: [latex, smallcaps, superscript]  # BibTeX 특수문자 변환

  replace_strings: true
  join_strings: true

  details_dir: bibliography       # 논문 상세 페이지 생성 경로
  details_link: Details

  query: "@*"                     # 표시할 논문 쿼리 (전체)
  group_by: year                  # 연도별 그룹핑
  group_order: descending         # 최신순 정렬

# 논문 카드에 표시할 배지 (altmetric: 언론 반응, dimensions: 인용수 등)
enable_publication_badges:
  altmetric: true
  dimensions: true
  google_scholar: true
  inspirehep: false

# BibTeX 항목 중 논문 카드에 버튼/링크로 표시할 커스텀 키워드 목록
# papers.bib에 pdf = {파일경로}, code = {URL} 등으로 넣으면 버튼이 생김
filtered_bibtex_keywords:
  [
    abbr,
    abstract,
    additional_info,
    altmetric,
    annotation,
    arxiv,
    award,
    award_name,
    bibtex_show,
    blog,
    code,
    dimensions,
    eprint,
    google_scholar_id,
    html,
    pdf,
    pmid,
    poster,
    preview,
    selected,
    slides,
    supp,
    video,
    website,
  ]

max_author_limit: 8               # 저자 표시 최대 수 (초과 시 "et al.")
more_authors_animation_delay: 10  # "et al." 클릭 시 나머지 저자 표시 딜레이(ms)
enable_publication_thumbnails: true  # 논문 카드 썸네일 이미지 표시

# =============================================================================
# Jekyll Link Attributes (외부 링크 처리)
# =============================================================================

external_links:
  enabled: true
  rel: external nofollow noopener   # 외부 링크 보안/SEO 속성
  target: _blank                    # 외부 링크는 새 탭에서 열기

# =============================================================================
# Responsive WebP Images (반응형 이미지 자동 변환)
# =============================================================================
# assets/img/ 의 이미지를 여러 크기의 WebP로 자동 변환.
# ImageMagick이 로컬에 설치되어 있어야 동작함.

imagemagick:
  enabled: false  # 로컬에서는 끔. GitHub Actions 배포 시에는 _config_production.yml이 true로 override.
  widths:               # 생성할 너비 목록 (픽셀)
    - 480
    - 800
    - 1400
  input_directories:
    - assets/img/
  input_formats:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".tiff"
    - ".gif"
  output_formats:
    webp: "-auto-orient -quality 85"

lazy_loading_images: true   # 이미지 지연 로딩 (페이지 속도 향상)

# =============================================================================
# Optional Features (선택 기능 on/off)
# =============================================================================

enable_google_analytics: false    # Google Analytics 사용 시 true로 변경
enable_google_verification: false # Google Search Console 인증 사용 시 true
enable_cookie_consent: false      # GDPR 쿠키 동의 배너
enable_masonry: true              # 블로그 카드 벽돌(masonry) 레이아웃
enable_math: true                 # MathJax 수식 렌더링 (제어이론 연구자라면 유용)
enable_tooltips: false            # 링크 호버 시 미리보기 툴팁
enable_darkmode: true             # 다크모드 토글
enable_navbar_social: true        # 네비게이션바에 소셜 아이콘 표시
enable_project_categories: false  # projects 페이지 없음
enable_medium_zoom: true          # 이미지 클릭 시 확대
enable_progressbar: true          # 페이지 상단 스크롤 진행 바
enable_video_embedding: false     # 영상 임베드 기능

